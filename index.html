<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIManga - AI漫剧创作助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ffa500 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 24px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: block;
        }
        
        .textarea, .input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .textarea {
            min-height: 100px;
            resize: none;
        }
        
        .textarea:focus, .input:focus {
            outline: none;
            border-color: #ff6b6b;
        }
        
        .template-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .template-btn {
            padding: 14px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            background: white;
            font-size: 13px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .template-btn.active {
            border-color: #ff6b6b;
            background: #fff5f5;
            color: #ff6b6b;
        }
        
        .template-btn .icon {
            font-size: 20px;
            display: block;
            margin-bottom: 4px;
        }
        
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ffa500 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .generate-btn:active {
            transform: scale(0.98);
        }
        
        .generate-btn:disabled {
            opacity: 0.6;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e8e8e8;
            border-top-color: #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .result {
            display: none;
            margin-top: 20px;
        }
        
        .result.show {
            display: block;
        }
        
        .result-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        .result-content {
            background: #f8f8fa;
            padding: 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.8;
            color: #333;
            margin-bottom: 16px;
        }
        
        .result-section {
            background: #fff5f5;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 12px;
        }
        
        .result-section h4 {
            font-size: 13px;
            color: #ff6b6b;
            margin-bottom: 8px;
        }
        
        .result-section p {
            font-size: 13px;
            color: #666;
            line-height: 1.6;
        }
        
        .action-btns {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 16px;
        }
        
        .action-btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .copy-btn {
            background: #ff6b6b;
            color: white;
        }
        
        .share-btn {
            background: #ffa500;
            color: white;
        }
        
        .history-section {
            margin-top: 24px;
        }
        
        .history-title {
            font-size: 14px;
            font-weight: 600;
            color: white;
            margin-bottom: 12px;
        }
        
        .history-item {
            background: white;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        
        .history-prompt {
            font-size: 13px;
            color: #333;
            line-height: 1.5;
        }
        
        .history-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }
        
        .history-time {
            font-size: 11px;
            color: #999;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 AIManga</h1>
            <p>AI 漫剧创作助手 - 移动端</p>
        </div>
        
        <div class="card">
            <div class="input-group">
                <label class="input-label">📝 输入你的故事/剧本</label>
                <textarea class="textarea" id="storyInput" placeholder="例如：在一个遥远的星球上，住着一位勇敢的公主..."></textarea>
            </div>
            
            <div class="input-group">
                <label class="input-label">🎭 选择风格</label>
                <div class="template-grid">
                    <button class="template-btn active" data-template="anime">
                        <span class="icon">🎭</span>
                        日系动漫
                    </button>
                    <button class="template-btn" data-template="comic">
                        <span class="icon">📚</span>
                        美式漫画
                    </button>
                    <button class="template-btn" data-template="chinese">
                        <span class="icon">🏯</span>
                        中国古风
                    </button>
                    <button class="template-btn" data-template="modern">
                        <span class="icon">🌆</span>
                        现代都市
                    </button>
                </div>
            </div>
            
            <div class="input-group">
                <label class="input-label">📺 分镜数量</label>
                <input type="range" id="sceneCount" min="4" max="12" value="6" style="width:100%">
                <div style="text-align:center; font-size:12px; color:#666;" id="sceneCountLabel">6 幕</div>
            </div>
            
            <button class="generate-btn" id="generateBtn">
                🎬 生成漫剧脚本
            </button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在创作...</p>
            </div>
            
            <div class="result" id="result">
                <div class="result-title">📜 生成的漫剧脚本</div>
                <div class="result-content" id="scriptContent"></div>
                
                <div class="result-section">
                    <h4>🎨 视觉描述</h4>
                    <p id="visualDesc"></p>
                </div>
                
                <div class="result-section">
                    <h4>💬 对话/旁白</h4>
                    <p id="dialogue"></p>
                </div>
                
                <div class="result-section">
                    <h4>🎵 背景音乐建议</h4>
                    <p id="music"></p>
                </div>
                
                <div class="action-btns">
                    <button class="action-btn copy-btn" id="copyBtn">📋 复制脚本</button>
                    <button class="action-btn share-btn" id="shareBtn">🔗 分享</button>
                </div>
            </div>
        </div>
        
        <div class="history-section" id="historySection">
            <div class="history-title">📜 历史记录</div>
            <div id="historyList"></div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        const templates = {
            anime: {
                style: '日系动漫风格，细腻的情感表达，樱花、教室、夏日祭典等元素',
                music: '轻柔的钢琴曲、吉他民谣、青春感的J-POP风格'
            },
            comic: {
                style: '美式漫画风格，强烈的视觉冲击，大色块、速度线、动态分镜',
                music: '节奏感强的电子乐、摇滚、动作片配乐风格'
            },
            chinese: {
                style: '中国古风，水墨画意境，宫廷、江湖、仙侠元素',
                music: '古筝、笛子、二胡等民乐，水墨风配乐'
            },
            modern: {
                style: '现代都市风格，咖啡厅、写字楼、城市夜景等场景',
                music: '爵士乐、流行R&B、城市生活感的配乐'
            }
        };
        
        let currentTemplate = 'anime';
        let currentScript = '';
        let history = JSON.parse(localStorage.getItem('aimanga_history') || '[]');
        
        const storyInput = document.getElementById('storyInput');
        const sceneCount = document.getElementById('sceneCount');
        const sceneCountLabel = document.getElementById('sceneCountLabel');
        const generateBtn = document.getElementById('generateBtn');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const scriptContent = document.getElementById('scriptContent');
        const visualDesc = document.getElementById('visualDesc');
        const dialogue = document.getElementById('dialogue');
        const music = document.getElementById('music');
        const copyBtn = document.getElementById('copyBtn');
        const shareBtn = document.getElementById('shareBtn');
        const toast = document.getElementById('toast');
        const historyList = document.getElementById('historyList');
        
        sceneCount.addEventListener('input', () => {
            sceneCountLabel.textContent = sceneCount.value + ' 幕';
        });
        
        document.querySelectorAll('.template-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.template-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTemplate = btn.dataset.template;
            });
        });
        
        generateBtn.addEventListener('click', generateScript);
        
        function generateScript() {
            const story = storyInput.value.trim();
            if (!story) {
                showToast('请输入故事内容');
                return;
            }
            
            generateBtn.disabled = true;
            loading.classList.add('show');
            result.classList.remove('show');
            
            setTimeout(() => {
                const scenes = parseInt(sceneCount.value);
                const template = templates[currentTemplate];
                currentScript = generateMangaScript(story, scenes, template);
                
                scriptContent.textContent = currentScript.script;
                visualDesc.textContent = currentScript.visual;
                dialogue.textContent = currentScript.dialogue;
                music.textContent = template.music;
                
                loading.classList.remove('show');
                result.classList.add('show');
                saveToHistory(currentScript.script);
                generateBtn.disabled = false;
            }, 1500);
        }
        
        function generateMangaScript(story, scenes, template) {
            const storySegments = story.split(/[。！？\n]/).filter(s => s.trim());
            
            let script = `# ${story.substring(0, 20)}...\n\n`;
            
            for (let i = 1; i <= scenes; i++) {
                const segment = storySegments[i % storySegments.length] || story;
                script += `【第${i}幕】\n`;
                script += `场景：${template.style.split('，')[0]}\n`;
                script += `动作：${getRandomAction()}\n\n`;
            }
            
            return {
                script: script,
                visual: `${template.style}，配合故事的氛围和节奏，注意光影效果和色彩搭配`,
                dialogue: `根据故事内容设计角色对话，每段对话不超过3句，保持角色性格一致`
            };
        }
        
        function getRandomAction() {
            const actions = [
                '角色特写，表情丰富，展现内心情感',
                '双人对话场景，镜头缓慢推进',
                '动作场景，快节奏分镜',
                '远景展示环境，渲染氛围',
                '中景镜头，平衡人物与环境'
            ];
            return actions[Math.floor(Math.random() * actions.length)];
        }
        
        function saveToHistory(script) {
            const entry = {
                id: Date.now(),
                script: script.substring(0, 100),
                time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
            };
            history.unshift(entry);
            if (history.length > 10) history.pop();
            localStorage.setItem('aimanga_history', JSON.stringify(history));
            renderHistory();
        }
        
        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<p style="color:#ccc;text-align:center;">暂无历史</p>';
                return;
            }
            historyList.innerHTML = history.map(item => `
                <div class="history-item">
                    <div class="history-prompt">${item.script}...</div>
                    <div class="history-meta">
                        <span style="font-size:11px;color:#999;">${item.time}</span>
                    </div>
                </div>
            `).join('');
        }
        
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(currentScript.script).then(() => showToast('已复制到剪贴板'));
        });
        
        shareBtn.addEventListener('click', () => {
            if (navigator.share) {
                navigator.share({ title: 'AIManga 漫剧脚本', text: currentScript.script });
            } else {
                navigator.clipboard.writeText(currentScript.script);
                showToast('已复制');
            }
        });
        
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        renderHistory();
    </script>
</body>
</html>
